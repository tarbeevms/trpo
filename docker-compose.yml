services:
  postgres:
    build:
      context: .
      dockerfile: build/Dockerfile
    container_name: taskflow-postgres
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
    ports:
      - "5432:5432"
    volumes:
      - taskflow-postgres-data:/var/lib/postgresql/data

volumes:
  taskflow-postgres-data:
